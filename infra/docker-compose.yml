version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: attendance_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: attendance_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: