version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: attendance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: attendance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d attendance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: attendance_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:secret123@db:5432/attendance
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-me-in-production
      BIOMETRIC_ENCRYPTION_KEY: ${BIOMETRIC_ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── React frontend ────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: attendance_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:8000

  # ── Kiosk edge app ────────────────────────────────────────────────────────
  kiosk:
    build: ./infra/kiosk
    container_name: attendance_kiosk
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SERVER_URL: http://backend:8000
      AUTH_TOKEN: ${KIOSK_AUTH_TOKEN:-}
      CLASSROOM_ID: ${CLASSROOM_ID:-classroom-1}
      CAMERA_INDEX: ${CAMERA_INDEX:-0}
      COOLDOWN_SEC: ${COOLDOWN_SEC:-10}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.80}
    volumes:
      - ./infra/ml/models:/app/models:ro   # read trained embeddings
      - ./infra/kiosk:/app
    # Grant access to the host webcam
    devices:
      - /dev/video0:/dev/video0
    # Required for OpenCV GUI (set DISPLAY if running headed)
    environment:
      DISPLAY: ${DISPLAY:-:0}
    network_mode: host   # simplest way to reach host camera + backend

volumes:
  postgres_data:
